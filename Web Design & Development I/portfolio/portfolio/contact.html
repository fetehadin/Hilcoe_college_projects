<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Me | Fetehadin Negash</title>
</head>
<body bgcolor="#AFEB8F" leftmargin="0" topmargin="0" marginwidth="0" marginheight="0">

    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="height: 100vh; border-collapse: collapse;">
        <!-- HEADER -->
        <tr bgcolor="#002F7B" height="120">
            <td align="center" valign="middle">
                <font face="Verdana, sans-serif" color="#FFFFFF" size="6">
                    <strong>CONTACT ME</strong>
                </font>
                <br><br>
                <nav>
                    <font face="Verdana, sans-serif" size="3">
                        <a href="index.html" style="color: #FFFFFF; text-decoration: none;">HOME</a>
                        <font color="#FFFFFF">&nbsp;&nbsp;|&nbsp;&nbsp;</font>
                        <a href="about.html" style="color: #FFFFFF; text-decoration: none;">ABOUT</a>
                        <font color="#FFFFFF">&nbsp;&nbsp;|&nbsp;&nbsp;</font>
                        <a href="contact.html" style="color: #AFEB8F; text-decoration: none;"><b>CONTACT</b></a>
                    </font>
                </nav>
            </td>
        </tr>

        <!-- MAIN CONTENT AREA -->
        <tr>
            <td align="center" valign="top">
                <table width="75%" border="0" cellspacing="0" cellpadding="50" bgcolor="#FFFFFF" style="min-height: 100%;">
                    <tr>
                        <td align="center" valign="top">
                            
                            <font face="Verdana, sans-serif" color="#002F7B">
                                <h2>Get In Touch</h2>
                                <p>Have a project or a question? Fill out the form below.</p>
                            </font>
                            <br>

                            <form action="#" method="post">
                                <table width="80%" border="0" cellspacing="0" cellpadding="10" bgcolor="#F9F9F9" style="border: 1px solid #002F7B;">
                                    <tr>
                                        <td align="right"><font face="Verdana, sans-serif"><b>Full Name:</b></font></td>
                                        <td><input type="text" name="name" size="40" required placeholder="Enter your name"></td>
                                    </tr>
                                    <tr>
                                        <td align="right"><font face="Verdana, sans-serif"><b>Email Address:</b></font></td> <br>
                                        <td><input type="email" name="email" size="40" required placeholder="name@example.com"></td>
                                    </tr>
                                    <tr>
                                        <td align="right"><font face="Verdana, sans-serif"><b>Gender:</b></font></td>
                                        <td>
                                            <input type="radio" name="gender" value="Male" id="m"> <label for="m">Male</label>
                                            <input type="radio" name="gender" value="Female" id="f"> <label for="f">Female</label>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td align="right"><font face="Verdana, sans-serif"><b>Project Field:</b></font></td>
                                        <td>
                                            <select name="field" style="width: 275px;">
                                                <option value="backend">Backend Development</option>
                                                <option value="frontend">Frontend Development</option>
                                                <option value="fullstack">Fullstack Solutions</option>
                                                <option value="consulting">General Consulting</option>
                                            </select>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td align="right" valign="top"><font face="Verdana, sans-serif"><b>Required Skills:</b></font></td>
                                        <td>
                                            <input type="checkbox" name="skill" value="Python"> Python
                                            <input type="checkbox" name="skill" value="Django"> Django
                                            <input type="checkbox" name="skill" value="SQL"> SQL
                                            <input type="checkbox" name="skill" value="JS"> JavaScript
                                        </td>
                                    </tr>
                                    <tr>
                                        <td align="right"><font face="Verdana, sans-serif"><b>Project Urgency:</b></font></td>
                                        <td>
                                            <font size="1">Low</font>
                                            <input type="range" name="rate" min="1" max="10">
                                            <font size="1">High</font>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td align="right" valign="top"><font face="Verdana, sans-serif"><b>Message:</b></font></td>
                                        <td><textarea name="message" rows="6" cols="41" placeholder="Write your message here..."></textarea></td>
                                    </tr>
                                    <tr>
                                        <td></td>
                                        <td>
                                            <input type="submit" value="Send Message" style="background-color: #002F7B; color: white; border: none; padding: 10px 20px; cursor: pointer;">
                                            <input type="reset" value="Reset" style="background-color: #AFEB8F; border: none; padding: 10px 20px; cursor: pointer;">
                                        </td>
                                    </tr>
                                </table>
                            </form>

                        </td>
                    </tr>
                </table>
            </td>
        </tr>

        <!-- FOOTER -->
        <tr bgcolor="#002F7B" height="80">
            <td align="center" valign="middle">
                <font face="Verdana, sans-serif" color="#FFFFFF" size="2">
                    &copy; 2026 Fetehadin Negash | All Rights Reserved
                </font>
            </td>
        </tr>
    </table>

</body>
</html>
